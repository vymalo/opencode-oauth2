name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Active LTS (22 = Iron) + current LTS (24 = Krypton).
        node: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first: @vymalo/opencode-browser-mcp typechecks/tests against
      # @vymalo/opencode-browser's published "./lib" export (dist/lib.d.ts),
      # which doesn't exist until the dependency is built. `pnpm -r` runs in
      # topological order, so this produces every package's dist up front.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check
