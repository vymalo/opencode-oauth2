packages:
  - packages/*
  - apps/*

# Native build scripts that are allowed to run on install.
# esbuild is a vitest/vite transitive dep; msgpackr-extract is an optional
# msgpack speedup. Both are widely-used packages with reputable maintainers
# — keep this list minimal and audit before adding.
#
# pnpm 11 prefers the explicit `allowBuilds: <pkg>: true` shape over the
# legacy `onlyBuiltDependencies` array; the latter is silently ignored in
# `--frozen-lockfile` mode, which makes it look like local installs work
# while CI breaks.
allowBuilds:
  esbuild: true
  msgpackr-extract: true
  # spawn-sync (a transitive WXT/web-ext dep) ships a native build step we do
  # not need — the prebuilt JS works fine. Deny it.
  spawn-sync: false
